# Cloudflare Pages deployment configuration
# Deploy with: npx wrangler pages deploy .vercel/output/static --project-name nexvid
# Or use the Cloudflare Pages dashboard to connect your Git repo

name = "nexvid"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Pages configuration
pages_build_output_dir = ".vercel/output/static"

# D1 Database binding (create with: npx wrangler d1 create nexvid-db)
# Uncomment after creating the database:
# [[d1_databases]]
# binding = "DB"
# database_name = "nexvid-db"
# database_id = "your-database-id-here"

# Environment variables (secrets should be set via dashboard or CLI)
# npx wrangler pages secret put FEBBOX_CLIENT_ID
# npx wrangler pages secret put FEBBOX_CLIENT_SECRET
# npx wrangler pages secret put TURNSTILE_SECRET_KEY

[vars]
TURNSTILE_SITE_KEY = "0x4AAAAAACn4sX2wYBjJSQUo"
ALLOWED_HOSTS = "*.febbox.com,febbox.com,*.shegu.net,*.febbox.org,*.stream.febbox.com,*.pobreflix.com,pobreflix.com,*.tmdb.org,api.themoviedb.org,image.tmdb.org,sub.wyzie.ru,api.theintrodb.org,*.vidlink.pro,vidlink.pro,*.vodvidl.site,*.b-cdn.net,videostr.net,oneproxy.1x2.space,*.1x2.space"
